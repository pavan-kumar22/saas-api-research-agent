</text>

<text
x="600"
y="405"
class="small">

Scores official developer documentation

</text>

<!-- Arrow -->

<line
x1="600"
y1="425"
x2="600"
y2="465"
class="arrow"/>

<!-- Extraction -->

<rect
x="330"
y="470"
width="540"
height="90"
rx="18"
class="box"/>

<text
x="600"
y="505"
class="label">

Extraction Agent (LLM)

</text>

<text
x="600"
y="530"
