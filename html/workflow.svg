<?xml version="1.0" encoding="UTF-8"?>

<svg
    xmlns="http://www.w3.org/2000/svg"
    width="1200"
    height="900"
    viewBox="0 0 1200 900">

<style>

.title{
    font:700 30px Arial,sans-serif;
    fill:#222;
}

.subtitle{
    font:16px Arial,sans-serif;
    fill:#666;
}

.box{
    fill:#ffffff;
    stroke:#2563eb;
    stroke-width:3;
    rx:18;
    ry:18;
}

.box2{
    fill:#eef5ff;
    stroke:#2563eb;
    stroke-width:3;
    rx:18;
    ry:18;
}

.label{
    font:700 22px Arial,sans-serif;
    fill:#1e293b;
    text-anchor:middle;
}

.small{
    font:15px Arial,sans-serif;
    fill:#475569;
    text-anchor:middle;
}

.arrow{
    stroke:#2563eb;
    stroke-width:4;
    fill:none;
    marker-end:url(#arrowhead);
}

</style>

<defs>

<marker
id="arrowhead"
markerWidth="12"
markerHeight="12"
refX="6"
refY="6"
orient="auto">

<polygon
points="0 0,12 6,0 12"
fill="#2563eb"/>

</marker>

</defs>

<!-- Title -->

<text
x="600"
y="50"
class="title"
text-anchor="middle">

API Research Agent Workflow

</text>

<text
x="600"
y="82"
class="subtitle"
text-anchor="middle">

End-to-End Pipeline used for the Composio Assessment

</text>

<!-- apps.csv -->

<rect
x="420"
y="110"
width="360"
height="70"
rx="18"
class="box2"/>

<text
x="600"
y="145"
class="label">

apps.csv

</text>

<text
x="600"
y="168"
class="small">

Input list of 100 SaaS applications

</text>

<!-- Arrow -->

<line
x1="600"
y1="180"
x2="600"
y2="215"
class="arrow"/>

<!-- Search -->

