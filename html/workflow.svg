x="360"
y="220"
width="480"
height="80"
rx="18"
class="box"/>

<text
x="600"
y="255"
class="label">

Documentation Search

</text>

<text
x="600"
y="280"
class="small">

DuckDuckGo Search (DDGS)

</text>

